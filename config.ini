# config.ini for spot-xtak.py
#
# The section name MUST be [spot-xtak] — that is the section cli() reads.
# Lines starting with # are comments. Uncomment and edit as needed.

[spot-xtak]

# 
# SPOT feed settings
# 

# Plain-text file containing ONLY your SPOT shared-page feed ID (GLID).
SPOT_FEED_KEY_FILE = spot_feed_id.txt

# Optional feed password (only if your SPOT shared page is password
# protected). Leave commented out if not used.
# SPOT_FEED_PASSWORD = 123456

# Seconds between SPOT API polls. Minimum enforced in code is 30.
# Recommended 150;
SPOT_POLL_INTERVAL = 150

# CoT type for the map pin. a-f-G-E-S = friendly ground equipment sensor.
SPOT_COT_TYPE = a-f-G-E-S

# Seconds until the pin goes stale on the map. Empty = 2x poll interval.
# SPOT_COT_STALE =

# 
# TAK Server destination
# 


# TAK SERVER (TLS). Edit host/port, then fill in the
# TLS identity section below.
COT_URL = tls://YOUR-SERVER-IP:8089

# 
# TLS identity
# 

# Client certificate.
# Path to your User Cert
PYTAK_TLS_CLIENT_CERT = certs/user.p12

# Password for the client cert / keystore (default atakatak).
PYTAK_TLS_CLIENT_PASSWORD = atakatak

# CA / truststore.
# Path to your Truststore Cert
PYTAK_TLS_CLIENT_CAFILE = certs/truststore-root.p12

# Password for the truststore (default atakatak).
PYTAK_TLS_TRUSTSTORE_PASSWORD = atakatak

# TLS verification bypass — handy for self-signed test servers only.
# Do NOT use in production.
# PYTAK_TLS_DONT_VERIFY = 1
# PYTAK_TLS_DONT_CHECK_HOSTNAME = 1

# ----------------------------------------------------------------------
# Misc
# ----------------------------------------------------------------------

# Verbose logging.
# DEBUG = False
